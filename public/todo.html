<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>숙제체크 - 아크그리드 젬 뷰어</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="page-header">
    <p class="kicker">LOST ARK · WEEKLY</p>
    <h1>숙제체크</h1>
    <p class="subtitle">캐릭터별 레이드·일일 숙제와 자유 항목을 체크하고, 코드만 있으면 다른 기기에서도 이어서 볼 수 있어요.</p>
    <a class="todo-nav-link" href="index.html">← 젬 뷰어로 돌아가기</a>
  </header>

  <div id="authGate" class="todo-auth">
    <div class="todo-auth-card">
      <h2>코드로 시작하기</h2>
      <p class="subtitle">이미 코드가 있다면 입력하고, 처음이면 새로 발급받으세요.</p>
      <form id="codeForm" class="todo-auth-form">
        <input id="codeInput" type="text" placeholder="8자리 코드 (예: 7K9MXQ2P)" autocomplete="off" maxlength="8" />
        <button type="submit">코드로 시작</button>
      </form>
      <button id="newCodeBtn" type="button" class="todo-secondary-btn">새 코드 발급받기</button>
      <div id="authStatus" class="todo-auth-status"></div>
    </div>
  </div>

  <div id="app" class="todo-app" style="display:none">
    <div class="todo-code-bar">
      <span>내 코드 <b id="myCode"></b></span>
      <button id="copyCodeBtn" type="button">복사</button>
      <button id="logoutBtn" type="button" class="todo-secondary-btn">다른 코드로 전환</button>
    </div>

    <form id="addCharForm" class="todo-add-char">
      <input id="charNameInput" type="text" placeholder="캐릭터 닉네임 추가" autocomplete="off" />
      <button type="submit">추가</button>
    </form>

    <div id="charactersEl" class="todo-characters"></div>

    <section class="todo-custom-section">
      <h2>커스텀 숙제</h2>
      <p class="subtitle">캐릭터에 속하지 않는 자유 항목이에요 (예: 길드 눈텅금, 개인 목표).</p>
      <form id="addCustomForm" class="todo-add-custom">
        <input id="customLabelInput" type="text" placeholder="항목 이름" autocomplete="off" />
        <select id="customResetSelect">
          <option value="weekly">매주 초기화</option>
          <option value="daily">매일 초기화</option>
          <option value="none">초기화 안 함</option>
        </select>
        <button type="submit">추가</button>
      </form>
      <div id="customListEl" class="todo-custom-list"></div>
    </section>
  </div>

  <script src="todo.js"></script>
</body>
</html>
