<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>아크그리드 젬 뷰어</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="page-header">
    <p class="kicker">LOST ARK · ARK GRID</p>
    <h1>아크그리드 젬 뷰어</h1>
    <p class="subtitle">캐릭터 닉네임을 검색하면 장착된 코어와 젬의 원본 옵션 — 필요 의지력, 포인트, 옵션 레벨 — 을 그대로 보여줍니다.</p>
  </header>

  <form id="searchForm" class="search-bar">
    <input id="nameInput" type="text" placeholder="캐릭터 닉네임 (예: 서강룡)" autocomplete="off" />
    <button type="submit">검색</button>
  </form>

  <div class="controls">
    <div class="control-group">
      <span class="control-label">역할</span>
      <div class="segmented" data-name="role">
        <label class="active">
          <input type="radio" name="role" value="dealer" checked />
          딜러
        </label>
        <label>
          <input type="radio" name="role" value="support" />
          서포터
        </label>
      </div>
    </div>

    <div class="control-group">
      <span class="control-label">목표 조합</span>
      <div class="segmented" data-name="scenario">
        <label class="active">
          <input type="radio" name="scenario" value="A" checked />
          안정·견고·불변·불변
        </label>
        <label>
          <input type="radio" name="scenario" value="B" />
          견고·견고·견고·불변
        </label>
      </div>
    </div>
  </div>

  <div id="status"></div>
  <div id="result"></div>

  <section id="replacementSection" class="replacement-section" style="display:none">
    <h2 id="replacementTitle">교체 우선순위</h2>
    <p class="subtitle" id="replacementSubtitle"></p>
    <div id="replacementTop" class="replacement-top"></div>
  </section>

  <section class="price-section">
    <h2>젬 시세</h2>
    <p class="subtitle">거래소 영웅 등급 원석 기준 실시간 최저가. 순위가 낮을수록(1위) 지금 가장 저렴하게 살 수 있는 티어입니다.</p>
    <div id="priceStatus" class="price-status"></div>
    <div id="priceTable" class="price-table"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
